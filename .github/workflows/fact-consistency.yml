name: 법령 팩트 상태 검사

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/check_fact_consistency.py
